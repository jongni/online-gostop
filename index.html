<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>🎴 온라인 고스톱</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --felt: #1a5c2a;
  --felt-dark: #123d1c;
  --gold: #f0c040;
  --card-w: 52px;
  --card-h: 78px;
}

body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: var(--felt-dark);
  color: #eee;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

.screen { display: none; width: 100%; height: 100%; }
.screen.active { display: flex; }

/* ── LOBBY ── */
#s-lobby {
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center,#1e6b32 0%,#0d3018 100%);
  flex-direction: column; gap: 16px; padding: 24px 20px;
  overflow-y: auto;
}
.lobby-header { text-align: center; }
.lobby-emoji { font-size: 3.5rem; line-height: 1; }
.lobby-title-text { font-size: 1.8rem; color: var(--gold); font-weight: bold; margin-top: 6px; }
.lobby-sub { font-size: .85rem; color: #888; margin-top: 4px; }
.lobby-box {
  background: rgba(0,0,0,.5); border: 2px solid #4a8a4a;
  border-radius: 16px; padding: 24px 20px;
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 12px;
}
.lobby-box label { font-size: .85rem; color: #aaa; }
.lobby-box input {
  padding: 14px 16px; border-radius: 10px; border: 1px solid #4a8a4a;
  background: #0a2010; color: #eee; font-size: 1rem; width: 100%;
}
.btn {
  padding: 14px; border: none; border-radius: 10px; cursor: pointer;
  font-size: 1rem; font-weight: bold; width: 100%; min-height: 50px;
  transition: opacity .1s;
}
.btn:active { opacity: .75; }
.btn-primary   { background: #2a7a40; color: #fff; }
.btn-secondary { background: #1a4a80; color: #fff; }
.divider { border: none; border-top: 1px solid #3a6a3a; margin: 2px 0; }
.err-msg { color: #f06060; font-size: .85rem; text-align: center; min-height: 1.2rem; }

/* ── ROOM ── */
#s-room {
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center,#1e6b32 0%,#0d3018 100%);
  flex-direction: column; gap: 20px; padding: 24px 20px;
  overflow-y: auto;
}
.room-box {
  background: rgba(0,0,0,.5); border: 2px solid #4a8a4a;
  border-radius: 16px; padding: 24px 20px;
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 14px;
}
.room-code { font-size: 2.2rem; font-weight: bold; text-align: center; color: var(--gold); letter-spacing: 8px; }
.player-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.player-list li {
  background: rgba(255,255,255,.07); padding: 12px 14px; border-radius: 10px;
  display: flex; align-items: center; gap: 10px; font-size: .95rem;
}
.player-dot { width: 10px; height: 10px; background: #4a8; border-radius: 50%; flex-shrink: 0; }

/* ── GAME ── */
#s-game {
  flex-direction: column; background: var(--felt);
  height: 100vh; height: 100dvh; overflow: hidden;
}

/* Status bar */
.status-bar {
  background: rgba(0,0,0,.6); padding: 6px 12px; font-size: .78rem;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #2a5a2a; flex-shrink: 0;
}
.status-turn  { color: var(--gold); font-weight: bold; white-space: nowrap; }
.status-phase { color: #a0d0a0; flex: 1; font-size: .72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deck-info    { color: #888; font-size: .72rem; white-space: nowrap; }

/* Opponents */
.opponents-row {
  display: flex; gap: 6px; padding: 6px 8px;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
  background: rgba(0,0,0,.25); border-bottom: 1px solid #1a4a1a;
}
.opponents-row::-webkit-scrollbar { display: none; }
.opponent-panel {
  background: rgba(0,0,0,.35); border: 1px solid #2a6a2a;
  border-radius: 8px; padding: 6px 8px; flex-shrink: 0; min-width: 110px; max-width: 160px;
}
.opp-name { font-weight: bold; font-size: .76rem; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.turn-ind { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: pulse 1s infinite; display: none; flex-shrink: 0; }
.turn-ind.on { display: block; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.opp-hand { display: flex; gap: 2px; overflow: hidden; flex-wrap: wrap; max-height: 38px; }
.card-back { width: 22px; height: 33px; background: linear-gradient(145deg,#1a1a6a,#2a2aaa); border: 1px solid #4a4aaa; border-radius: 3px; flex-shrink: 0; }
.opp-score { font-size: .67rem; color: #9a9; margin-top: 3px; }

/* Field area */
.field-section {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 6px 8px; overflow: hidden; min-height: 0;
}
.field-cards {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
  align-content: center; flex: 1;
  max-width: calc(100% - 68px); max-height: 100%;
}
.deck-area { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.deck-pile {
  width: var(--card-w); height: var(--card-h);
  background: linear-gradient(145deg,#1a1a6a,#2a2aaa); border: 2px solid #4a4aaa;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2px;
}
.deck-count-lbl { font-size: .62rem; color: var(--gold); font-weight: bold; }

/* My info bar */
.my-info-bar {
  background: rgba(0,0,0,.4); border-top: 1px solid #2a4a2a;
  padding: 5px 10px; flex-shrink: 0;
}
.score-compact {
  font-size: .74rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.score-compact .sc-total { color: var(--gold); font-weight: bold; font-size: .82rem; }
.score-compact .sc-item  { color: #bbb; }
.score-compact .sc-item span { color: var(--gold); font-weight: bold; }
.captured-toggle { font-size: .68rem; color: #7a9; cursor: pointer; margin-top: 3px; display: inline-block; padding: 2px 0; }
.captured-area { display: none; flex-wrap: wrap; gap: 2px; margin-top: 4px; max-height: 50px; overflow-y: auto; }
.captured-area.open { display: flex; }
.captured-area .card { width: 28px; height: 42px; }

/* My hand */
.my-hand-section {
  background: rgba(0,0,0,.45); border-top: 1px solid #2a4a2a;
  padding: 6px 8px 8px; flex-shrink: 0;
}
.hand-label { font-size: .68rem; color: #7a9; margin-bottom: 5px; }
.my-hand {
  display: flex; gap: 5px;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.my-hand::-webkit-scrollbar { display: none; }

/* ── CARDS ── */
.card {
  width: var(--card-w); height: var(--card-h);
  border-radius: 6px; border: 2px solid rgba(255,255,255,.2);
  cursor: pointer; transition: transform .12s, box-shadow .12s;
  user-select: none; position: relative; flex-shrink: 0;
  overflow: hidden; background-color: #fff;
}
.card:active { opacity: .82; }
.card.selected { transform: translateY(-10px); box-shadow: 0 0 0 3px var(--gold), 0 8px 20px rgba(0,0,0,.6); }
.card.highlight { box-shadow: 0 0 0 3px #60e060 !important; transform: translateY(-5px); }
.card.dim { opacity: .3; pointer-events: none; }
.double-badge {
  position: absolute; top: 2px; right: 2px;
  background: #f03333; color: #fff; font-size: .45rem;
  padding: 1px 3px; border-radius: 2px; font-weight: bold;
}

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.82);
  display: none; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 16px; padding: 20px;
}
.overlay.active { display: flex; }
.overlay-box {
  background: rgba(8,25,8,.97); border: 2px solid var(--gold);
  border-radius: 18px; padding: 28px 24px; text-align: center;
  display: flex; flex-direction: column; gap: 14px;
  width: 100%; max-width: 340px;
}
.overlay-title { font-size: 1.4rem; font-weight: bold; color: var(--gold); }
.overlay-sub   { color: #ccc; font-size: .95rem; }
.btn-group { display: flex; gap: 10px; }
.btn-go   { flex: 1; background: #b83018; color: #fff; font-size: 1.1rem; padding: 16px; border-radius: 12px; border: none; font-weight: bold; min-height: 56px; cursor: pointer; }
.btn-stop { flex: 1; background: #183878; color: #fff; font-size: 1.1rem; padding: 16px; border-radius: 12px; border: none; font-weight: bold; min-height: 56px; cursor: pointer; }
.btn-go:active   { opacity: .8; }
.btn-stop:active { opacity: .8; }

/* ── GAME OVER ── */
#s-gameover {
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center,#1e6b32,#0d3018);
  flex-direction: column; gap: 16px; padding: 20px;
  overflow-y: auto;
}
.gameover-box {
  background: rgba(0,0,0,.65); border: 2px solid var(--gold);
  border-radius: 18px; padding: 24px 20px;
  width: 100%; max-width: 420px;
}
.gameover-title { font-size: 1.6rem; color: var(--gold); text-align: center; margin-bottom: 14px; }
.result-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.1); gap: 8px;
}
.result-row.winner { color: var(--gold); font-weight: bold; }

/* ── CHAT FAB ── */
.chat-fab {
  position: fixed; right: 14px; bottom: 14px;
  width: 50px; height: 50px; border-radius: 50%;
  background: #2a6030; border: 2px solid #4a8a4a;
  font-size: 1.3rem; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 50; box-shadow: 0 3px 10px rgba(0,0,0,.5);
}
.chat-fab.visible { display: flex; }
.chat-fab:active { opacity: .8; }
.chat-badge {
  position: absolute; top: -2px; right: -2px; width: 16px; height: 16px;
  background: #e03030; border-radius: 50%; font-size: .55rem; color: #fff;
  display: none; align-items: center; justify-content: center;
}
.chat-badge.show { display: flex; }

/* ── CHAT SHEET ── */
.chat-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(5,18,5,.97); border-top: 2px solid #2a5a2a;
  border-radius: 16px 16px 0 0; z-index: 60;
  flex-direction: column; max-height: 55vh;
  display: flex; transform: translateY(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.chat-sheet.open { transform: translateY(0); }
.chat-sheet-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #2a4a2a; flex-shrink: 0;
}
.chat-sheet-title { font-weight: bold; color: var(--gold); font-size: .9rem; }
.chat-close { background: none; border: none; color: #999; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 8px 14px;
  font-size: .8rem; display: flex; flex-direction: column; gap: 4px;
}
.chat-msg { line-height: 1.4; word-break: break-all; }
.chat-msg .cn { color: var(--gold); font-weight: bold; }
.chat-msg.sys { color: #90b890; font-style: italic; }
.chat-input-row {
  display: flex; gap: 6px; padding: 8px 12px;
  border-top: 1px solid #2a4a2a; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: rgba(255,255,255,.1); border: 1px solid #3a6a3a;
  border-radius: 8px; color: #eee; padding: 10px 12px; font-size: .9rem;
}
.btn-chat {
  background: #2a6030; color: #fff; border: none; border-radius: 8px;
  padding: 10px 16px; font-size: .9rem; font-weight: bold; cursor: pointer;
}
.btn-chat:active { opacity: .8; }
</style>
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="s-lobby" class="screen active">
  <div class="lobby-header">
    <div class="lobby-emoji">🎴</div>
    <div class="lobby-title-text">온라인 고스톱</div>
    <div class="lobby-sub">2~4인 멀티플레이어</div>
  </div>
  <div class="lobby-box">
    <label>닉네임</label>
    <input id="inp-name" placeholder="이름을 입력하세요" maxlength="10">
    <button class="btn btn-primary" onclick="createRoom()">방 만들기</button>
    <hr class="divider">
    <label>방 코드</label>
    <input id="inp-room" placeholder="예: AB3CD" maxlength="5" style="text-transform:uppercase">
    <button class="btn btn-secondary" onclick="joinRoom()">방 참가</button>
    <div class="err-msg" id="lobby-err"></div>
  </div>
</div>

<!-- ══ ROOM ══ -->
<div id="s-room" class="screen">
  <div class="room-box">
    <div style="text-align:center;font-size:.85rem;color:#aaa">방 코드</div>
    <div class="room-code" id="room-code-display">─────</div>
    <div style="text-align:center;font-size:.8rem;color:#888">이 코드를 친구에게 알려주세요</div>
    <hr class="divider">
    <div style="font-size:.85rem;color:#aaa">참가자 (<span id="player-count">0</span>/4명)</div>
    <ul class="player-list" id="player-list"></ul>
    <button class="btn btn-primary" id="btn-start" onclick="startGame()" style="display:none">게임 시작 ▶</button>
    <div class="err-msg" id="room-err"></div>
    <div style="text-align:center;color:#888;font-size:.8rem" id="waiting-msg">방장이 게임을 시작할 때까지 기다려주세요...</div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="s-game" class="screen">
  <div class="status-bar">
    <span class="status-turn" id="status-turn"></span>
    <span class="status-phase" id="status-phase"></span>
    <span class="deck-info">덱 <span id="deck-count">0</span>장</span>
  </div>
  <div class="opponents-row" id="opponents-row"></div>
  <div class="field-section">
    <div class="field-cards" id="field-cards"></div>
    <div class="deck-area">
      <div class="deck-pile">
        <span style="font-size:1.3rem">🀫</span>
        <span class="deck-count-lbl" id="deck-count2">0</span>
      </div>
      <div style="font-size:.62rem;color:#777;margin-top:1px">덱</div>
    </div>
  </div>
  <div class="my-info-bar">
    <div class="score-compact" id="my-score-panel">
      <span class="sc-total">📊 0점</span>
    </div>
    <div class="captured-toggle" onclick="document.getElementById('my-captured').classList.toggle('open')">획득 카드 펼치기 ▾</div>
    <div class="captured-area" id="my-captured"></div>
  </div>
  <div class="my-hand-section">
    <div class="hand-label">✋ 내 손패 (<span id="my-hand-count">0</span>장)</div>
    <div class="my-hand" id="my-hand"></div>
  </div>
</div>

<!-- ══ GAME OVER ══ -->
<div id="s-gameover" class="screen">
  <div class="gameover-box">
    <div class="gameover-title">🏆 게임 종료</div>
    <div id="gameover-results"></div>
    <button class="btn btn-primary" onclick="location.reload()" style="margin-top:14px">처음으로</button>
  </div>
</div>

<!-- ══ GO/STOP OVERLAY ══ -->
<div class="overlay" id="ov-gostop">
  <div class="overlay-box">
    <div class="overlay-title">🔥 고스톱 결정!</div>
    <div class="overlay-sub" id="gostop-msg"></div>
    <div class="btn-group">
      <button class="btn-go"   onclick="decide('go')">고! 🔥</button>
      <button class="btn-stop" onclick="decide('stop')">스톱 ✋</button>
    </div>
  </div>
</div>

<!-- ══ WAIT OVERLAY ══ -->
<div class="overlay" id="ov-wait">
  <div class="overlay-box">
    <div class="overlay-title" id="wait-msg">잠시 기다려주세요...</div>
  </div>
</div>

<!-- ══ CHAT FAB ══ -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()">
  💬
  <span class="chat-badge" id="chat-badge">!</span>
</button>

<!-- ══ CHAT SHEET ══ -->
<div class="chat-sheet" id="chat-sheet">
  <div class="chat-sheet-header">
    <span class="chat-sheet-title">💬 채팅</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-msgs"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chat-inp" placeholder="채팅..." onkeydown="if(event.key==='Enter')sendChat()" maxlength="60">
    <button class="btn-chat" onclick="sendChat()">전송</button>
  </div>
</div>

<script>
function makeCard(c, { onClick, extraClass = '' } = {}) {
  const d = document.createElement('div');
  d.className = `card ${extraClass}`;
  d.dataset.id = c.id;
  d.style.backgroundImage = `url('img/cards/${c.id}.png')`;
  d.style.backgroundSize = '100% 100%';
  if (c.double) {
    const badge = document.createElement('span');
    badge.className = 'double-badge';
    badge.textContent = '×2';
    d.appendChild(badge);
  }
  if (onClick) d.addEventListener('click', () => onClick(c));
  return d;
}

const socket = io();
let myId = null, gs = null;
let selCard = null;
let pendingChoices = [];
let waitField = false, waitDeck = false;
let chatOpen = false, chatUnread = 0;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-sheet').classList.toggle('open', chatOpen);
  if (chatOpen) {
    chatUnread = 0;
    document.getElementById('chat-badge').classList.remove('show');
    setTimeout(() => document.getElementById('chat-inp').focus(), 300);
  }
}

function createRoom() {
  const n = document.getElementById('inp-name').value.trim();
  if (!n) return lobbyErr('이름을 입력하세요.');
  socket.emit('create_room', { name: n });
}
function joinRoom() {
  const n = document.getElementById('inp-name').value.trim();
  const r = document.getElementById('inp-room').value.trim().toUpperCase();
  if (!n) return lobbyErr('이름을 입력하세요.');
  if (!r) return lobbyErr('방 코드를 입력하세요.');
  socket.emit('join_room', { roomId: r, name: n });
}
function lobbyErr(m) { document.getElementById('lobby-err').textContent = m; }
function roomErr(m)  { document.getElementById('room-err').textContent = m; }
function startGame() { socket.emit('start_game'); }

function renderPlayers(ps) {
  const ul = document.getElementById('player-list');
  ul.innerHTML = '';
  ps.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="player-dot"></span> ${p.name}${i===0?' <span style="color:var(--gold);font-size:.75rem">(방장)</span>':''}`;
    ul.appendChild(li);
  });
  document.getElementById('player-count').textContent = ps.length;
}

socket.on('room_ready', d => {
  document.getElementById('room-code-display').textContent = d.roomId;
  renderPlayers(d.players);
  if (d.isHost) {
    document.getElementById('btn-start').style.display = '';
    document.getElementById('waiting-msg').style.display = 'none';
  }
  show('s-room');
});

socket.on('player_joined', d => {
  renderPlayers(d.players);
  sysChat(`${d.players[d.players.length-1].name}님이 참가했습니다.`);
});

socket.on('player_left', d => {
  renderPlayers(d.players);
  sysChat(`${d.name}님이 나갔습니다.`);
});

socket.on('err', m => { lobbyErr(m); roomErr(m); });

socket.on('game_started', () => {
  show('s-game');
  document.getElementById('chat-fab').classList.add('visible');
});

socket.on('game_state', state => {
  gs = state;
  myId = state.myId;
  renderAll(state);
});

socket.on('go_stop_prompt', ({ pid, name, score }) => {
  if (pid === myId) {
    document.getElementById('gostop-msg').textContent = `현재 점수: ${score}점 — 계속할까요?`;
    document.getElementById('ov-gostop').classList.add('active');
  } else {
    document.getElementById('wait-msg').textContent = `${name}이(가) 고/스톱 결정 중...`;
    document.getElementById('ov-wait').classList.add('active');
  }
});

socket.on('player_went', () => {
  document.getElementById('ov-wait').classList.remove('active');
  document.getElementById('ov-gostop').classList.remove('active');
});

socket.on('choose_field_card', ({ card, choices }) => {
  waitField = true;
  selCard = card;
  pendingChoices = choices;
  renderField(gs.field);
  setStatus('획득할 바닥 카드를 선택하세요', true);
});

socket.on('choose_deck_field_card', ({ card, choices }) => {
  waitDeck = true;
  pendingChoices = choices;
  renderField(gs.field);
  setStatus(`${card.month}월 덱카드 — 획득할 바닥 카드를 선택하세요`, true);
});

socket.on('chat', d => addChat(d));

socket.on('game_over', ({ winner, nameMap, results }) => {
  document.getElementById('ov-gostop').classList.remove('active');
  document.getElementById('ov-wait').classList.remove('active');
  const sorted = Object.entries(results).sort((a,b) => b[1].total - a[1].total);
  const el = document.getElementById('gameover-results');
  el.innerHTML = '';
  sorted.forEach(([pid, r]) => {
    const row = document.createElement('div');
    row.className = `result-row ${pid===winner?'winner':''}`;
    const go = r.goCount > 0 ? ` (${r.goCount}고 ×${r.mult})` : '';
    row.innerHTML = `
      <span>${pid===winner?'🏆 ':''}${nameMap[pid]}</span>
      <span style="font-size:.82rem;color:${pid===winner?'var(--gold)':'#bbb'}">
        ${r.score}점${go} = <b>${r.total}점</b><br>
        광${r.counts.gwang} 열끗${r.counts.yeol} 띠${r.counts.ribbon} 피${r.counts.pi}
      </span>`;
    el.appendChild(row);
  });
  show('s-gameover');
});

function renderAll(s) {
  const { myHand, field, captured, handSizes, currentPlayerId,
          isMyTurn, playerIds, nameMap, scores, goCount, deckSize, phase } = s;

  document.getElementById('deck-count').textContent  = deckSize;
  document.getElementById('deck-count2').textContent = deckSize;
  document.getElementById('my-hand-count').textContent = myHand.length;

  if (isMyTurn && phase === 'play') {
    setStatus('내 차례 — 손패에서 카드를 선택하세요', true);
  } else if (!isMyTurn) {
    setStatus(`${nameMap[currentPlayerId]}의 차례`, false);
    document.getElementById('ov-wait').classList.remove('active');
  }

  renderField(field);
  renderMyHand(myHand, isMyTurn && phase === 'play');
  renderMyCaptured(captured[myId] || []);
  renderOpponents(playerIds, nameMap, handSizes, captured, scores, goCount, currentPlayerId);
  renderMyScore(scores[myId]);

  if (isMyTurn) document.getElementById('ov-wait').classList.remove('active');
}

function setStatus(msg, mine) {
  document.getElementById('status-turn').textContent  = mine ? '🟢 내 차례' : '⏳';
  document.getElementById('status-phase').textContent = msg;
}

function renderField(cards) {
  const el = document.getElementById('field-cards');
  el.innerHTML = '';
  cards.forEach(c => {
    const isChoice = pendingChoices.includes(c.id) && (waitField || waitDeck);
    const isMatch  = selCard && !waitField && !waitDeck && gs?.isMyTurn && gs?.phase==='play' && c.month === selCard.month;
    let ec = '';
    if (isChoice || isMatch) ec = 'highlight';
    const onClick = (isChoice || isMatch) ? card => fieldClick(card.id) : null;
    el.appendChild(makeCard(c, { onClick, extraClass: ec }));
  });
}

function renderMyHand(cards, active) {
  const el = document.getElementById('my-hand');
  el.innerHTML = '';
  cards.forEach(c => {
    const sel = selCard && selCard.id === c.id;
    const dim = !active;
    el.appendChild(makeCard(c, {
      onClick: active ? card => handClick(card) : null,
      extraClass: `${sel?'selected':''} ${dim?'dim':''}`,
    }));
  });
}

function renderMyCaptured(cards) {
  const el = document.getElementById('my-captured');
  el.innerHTML = '';
  cards.forEach(c => el.appendChild(makeCard(c)));
}

function renderOpponents(pids, nm, hs, cap, scores, go, curPid) {
  const row = document.getElementById('opponents-row');
  row.innerHTML = '';
  pids.filter(p => p !== myId).forEach(pid => {
    const sc  = scores[pid] || { score:0, counts:{gwang:0,yeol:0,ribbon:0,pi:0} };
    const gc  = go[pid] || 0;
    const cur = pid === curPid;
    const div = document.createElement('div');
    div.className = 'opponent-panel';
    div.innerHTML = `
      <div class="opp-name">
        <span class="turn-ind ${cur?'on':''}"></span>
        ${nm[pid]}${gc>0?` <span style="color:#f06020;font-size:.65rem">${gc}고</span>`:''}
      </div>
      <div class="opp-hand" id="oh-${pid}"></div>
      <div class="opp-score">${sc.score}점 | 광${sc.counts.gwang} 열${sc.counts.yeol} 띠${sc.counts.ribbon} 피${sc.counts.pi}</div>`;
    const hd = div.querySelector(`#oh-${pid}`);
    const n = Math.min(hs[pid]||0, 10);
    for (let i=0;i<n;i++) { const b=document.createElement('div'); b.className='card-back'; hd.appendChild(b); }
    if ((hs[pid]||0)>10) { const s=document.createElement('span'); s.style.cssText='font-size:.65rem;color:#888;align-self:center'; s.textContent=`+${(hs[pid]||0)-10}`; hd.appendChild(s); }
    row.appendChild(div);
  });
}

function renderMyScore(sc) {
  if (!sc) return;
  const { score, breakdown, counts } = sc;
  document.getElementById('my-score-panel').innerHTML = `
    <span class="sc-total">📊 ${score}점</span>
    <span class="sc-item">광<span>${counts.gwang}</span></span>
    <span class="sc-item">열끗<span>${counts.yeol}</span></span>
    <span class="sc-item">띠<span>${counts.ribbon}</span></span>
    <span class="sc-item">피<span>${counts.pi}</span></span>`;
}

function handClick(card) {
  if (!gs || !gs.isMyTurn || gs.phase !== 'play') return;
  if (waitField || waitDeck) return;

  if (selCard && selCard.id === card.id) {
    doPlay(card, null);
    return;
  }

  selCard = card;
  const matches = gs.field.filter(c => c.month === card.month);

  if (matches.length === 0 || matches.length === 1 || matches.length >= 3) {
    renderField(gs.field);
    renderMyHand(gs.myHand, true);
    doPlay(card, null);
  } else {
    pendingChoices = matches.map(c => c.id);
    renderField(gs.field);
    renderMyHand(gs.myHand, true);
    setStatus('획득할 바닥 카드를 선택하세요', true);
  }
}

function fieldClick(fid) {
  if (waitField) {
    waitField = false;
    const sc = selCard;
    selCard = null; pendingChoices = [];
    socket.emit('play_card', { cardId: sc.id, fieldChoiceId: fid });
  } else if (waitDeck) {
    waitDeck = false;
    pendingChoices = [];
    socket.emit('choose_deck_field', { fieldChoiceId: fid });
  } else if (selCard && gs?.isMyTurn) {
    const sc = selCard;
    selCard = null; pendingChoices = [];
    socket.emit('play_card', { cardId: sc.id, fieldChoiceId: fid });
  }
}

function doPlay(card, fid) {
  selCard = null; pendingChoices = [];
  socket.emit('play_card', { cardId: card.id, fieldChoiceId: fid });
}

function decide(d) {
  document.getElementById('ov-gostop').classList.remove('active');
  socket.emit('go_stop', { decision: d });
  if (d === 'go') {
    document.getElementById('wait-msg').textContent = '다른 플레이어를 기다리는 중...';
    document.getElementById('ov-wait').classList.add('active');
  }
}

function addChat(d) {
  const el = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (d.system ? ' sys' : '');
  if (d.system) div.textContent = d.msg;
  else div.innerHTML = `<span class="cn">${d.name}:</span> ${d.msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  if (!chatOpen) {
    chatUnread++;
    const badge = document.getElementById('chat-badge');
    badge.textContent = chatUnread > 9 ? '!' : chatUnread;
    badge.classList.add('show');
  }
}
function sysChat(m) { addChat({ system: true, msg: m }); }
function sendChat() {
  const inp = document.getElementById('chat-inp');
  const m = inp.value.trim();
  if (!m) return;
  socket.emit('chat', { msg: m });
  inp.value = '';
}

document.getElementById('inp-name').focus();
</script>
</body>
</html>
